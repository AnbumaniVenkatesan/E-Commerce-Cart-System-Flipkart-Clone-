<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart</title>
    <link rel="icon" href="Images/Flipkart logo.png">
</head>
<style>
    * {
        margin: 0%;
        padding: 0%;
        background-color: rgb(255, 255, 255);
    }

    .nav {
        height: 30px;
        display: flex;
        border-style: groove;
        padding: 10px;
        border-color: black;
        background-color: aquamarine;
    }

    .nav h2 {
        padding-left: 20px;
        color: rgb(168, 103, 241);
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        background-color: aquamarine;
    }

    .nav h3 {
        margin-left: 960px;
        padding-left: 20px;
        color: rgb(207, 207, 77);
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        background-color: aquamarine;
    }
    .loginbox{
        width: 40%;
        height: 500px;
        border-style: solid;
        margin-left: 30%;
        margin-top: 50px;
        border-radius: 15px;
        background-color: grey;
    }
    .loginbox h2,a{
        text-align: center;
        margin-top: 10px;
        background-color: grey;
    }
    .loginbox form{
        margin-top: 100px;
        margin-left: 100px;
        background-color: grey;
    }
    .loginbox table,td,tr{
        background-color: grey;
    }
    .loginbox td{
        padding-bottom: 20px;
    }
</style>

<body>
    <div class="nav">
        <h2>FLIPCART</h2>
        <h3>WELCOME!</h3>
    </div>
    <div class="loginbox">
        <h2><a>Login</a>/<a onclick="">Register</a></h2>
        <form>
            <table>
                <tr><td>User Name </td><td>: <input type="text" placeholder="Enter a name"></td></tr>
                <tr><td>Password  </td><td>: <input type="password" placeholder="password"></td></tr>
            </table>
        </form>
        <button>Login</button>
    </div>
</body>

</html>
